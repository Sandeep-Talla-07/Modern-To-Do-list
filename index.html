<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Orbitron:wght@400..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto+Slab:wght@100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>To Do List</title>
</head>

<body>
    <div class="container">
        <h1><img src="Images/to-do.png" alt=""> My Tasks</h1>

        <div class="input-row">
            <input type="text" id="input-text" placeholder="Add your task...">
            <button id="add-btn">Add</button>
        </div>

        <div class="filters">
            <button class="active" data-filter="all">All</button>
            <button data-filter="active">Active</button>
            <button data-filter="done">Done</button>
        </div>

        <ul id="todo-list">
            <!-- <li class="todo-task">Task 01 <span class="del-btn">x</span></li>
            <li class="todo-task"><input type="checkbox" class="todo-item">Task 02</li> -->
        </ul>



        <div class="footer">
            <span id="count-label">0 taks left</span>
            <button id="clear-done">Clear Done</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
